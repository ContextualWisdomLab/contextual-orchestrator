name: Security

# Dependency review, Trivy filesystem, OSV, and OpenSSF Scorecard are covered by
# the org-wide CENTRAL required workflows in ContextualWisdomLab/.github.
# CodeQL and Python supply-chain evidence stay repo-local because CodeQL default
# setup is not configured and pip-audit/SBOM evidence is not covered centrally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql_analysis:
    name: CodeQL analysis
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7 # github/codeql-action/init@v4.35.3
        with:
          languages: python
          build-mode: none

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # github/codeql-action/analyze@v4.37.0
        with:
          category: "/language:python"

  python_supply_chain:
    name: Python supply chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install audit and SBOM tools
        run: python -m pip install --require-hashes -r requirements-security-ci.txt

      - name: Install pinned Python dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --no-deps -e .

      - name: Audit pinned dependencies
        run: python -m pip_audit -r requirements.lock

      - name: Generate CycloneDX SBOM
        run: cyclonedx-py environment --output-format json --output-file cyclonedx-sbom.json

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # actions/upload-artifact@v5
        with:
          name: cyclonedx-sbom
          path: cyclonedx-sbom.json
