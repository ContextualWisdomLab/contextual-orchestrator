name: Security

# CodeQL, dependency-review, Trivy filesystem, and OpenSSF Scorecard were
# removed from this workflow because they duplicate the org-wide CENTRAL
# required workflows in ContextualWisdomLab/.github (CodeQL PR, OSV-Scanner PR,
# Scorecard PR, Security Scan = trivy-fs/osv-scan/scorecard) that already run in
# this repo's context on every PR. Only the Python supply-chain job (pip-audit +
# CycloneDX SBOM) is kept here because it is NOT covered centrally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python_supply_chain:
    name: Python supply chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install audit and SBOM tools
        run: python -m pip install pip-audit cyclonedx-bom

      - name: Install pinned Python dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --no-deps -e .

      - name: Audit pinned dependencies
        run: python -m pip_audit -r requirements.lock

      - name: Generate CycloneDX SBOM
        run: cyclonedx-py environment --output-format json --output-file cyclonedx-sbom.json

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # actions/upload-artifact@v5
        with:
          name: cyclonedx-sbom
          path: cyclonedx-sbom.json
