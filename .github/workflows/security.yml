name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql_analysis:
    name: CodeQL analysis
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  dependency_review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    # Keep dependency review intentionally resilient when repository settings disable dependency graph.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Detect dependency graph support
        id: dependency_graph_support
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          enabled="$(python - <<'PY'
import json
import os
import urllib.error
import urllib.request


request = urllib.request.Request(
    f"https://api.github.com/repos/{os.environ['GITHUB_REPOSITORY']}"
)
request.add_header("Authorization", f"Bearer {os.environ['GH_TOKEN']}")
request.add_header("Accept", "application/vnd.github+json")

try:
    with urllib.request.urlopen(request, timeout=20) as response:
        payload = json.loads(response.read().decode("utf-8"))
except urllib.error.HTTPError:
    payload = {}
except Exception:
    payload = {}

print(
    str(
        payload.get("security_and_analysis", {})
        .get("dependency_graph", {})
        .get("enabled", False)
    ).lower().strip()
)
PY
)"
          enabled="$(printf '%s' "${enabled}" | tr -d '\r' | tr -d '[:space:]')"
          echo "enabled=${enabled}" >> "${GITHUB_OUTPUT}"

      - name: Review dependency changes
        if: steps.dependency_graph_support.outputs.enabled == 'true'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  trivy_filesystem:
    name: Trivy filesystem
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-filesystem

  scorecard_analysis:
    name: OpenSSF Scorecard
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_format: sarif
          results_file: scorecard-results.sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        if: ${{ always() && hashFiles('scorecard-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
          category: openssf-scorecard
