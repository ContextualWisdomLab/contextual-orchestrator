name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql_analysis:
    name: CodeQL analysis
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@411bbbe57033eedfc1a82d68c01345aa96c737d7 # github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@411bbbe57033eedfc1a82d68c01345aa96c737d7 # github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  dependency_review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    # Keep dependency review intentionally resilient when repository settings disable dependency graph.
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false

      - name: Detect dependency graph support
        id: dependency_graph_support
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          enabled="$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.security_and_analysis.dependency_graph.enabled // false' || echo false)"
          enabled="$(printf '%s' "${enabled}" | tr -d '\r' | tr -d '[:space:]')"
          echo "enabled=${enabled}" >> "${GITHUB_OUTPUT}"

      - name: Review dependency changes
        if: ${{ steps.dependency_graph_support.outputs.enabled == 'true' }}
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # actions/dependency-review-action@v5.0.0
        with:
          fail-on-severity: high

  python_supply_chain:
    name: Python supply chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install audit and SBOM tools
        run: python -m pip install pip-audit cyclonedx-bom

      - name: Install pinned Python dependencies
        run: |
          python -m pip install --require-hashes -r requirements.lock
          python -m pip install --no-deps -e .

      - name: Audit pinned dependencies
        run: python -m pip_audit -r requirements.lock

      - name: Generate CycloneDX SBOM
        run: cyclonedx-py environment --output-format json --output-file cyclonedx-sbom.json

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # actions/upload-artifact@v5
        with:
          name: cyclonedx-sbom
          path: cyclonedx-sbom.json

  trivy_filesystem:
    name: Trivy filesystem
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: "."
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy SARIF
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@3cf0a529d8434171b6af190714e8d5b7abb83927 # github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-filesystem

  scorecard_analysis:
    name: OpenSSF Scorecard
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@99c09fe975337306107572b4fdf4db224cf8e2f2 # ossf/scorecard-action@v2.4.3
        with:
          results_format: sarif
          results_file: scorecard-results.sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        if: ${{ always() && hashFiles('scorecard-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@3cf0a529d8434171b6af190714e8d5b7abb83927 # github/codeql-action/upload-sarif@v4
        with:
          sarif_file: scorecard-results.sarif
          category: openssf-scorecard
